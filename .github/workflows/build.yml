name: Build Android APK

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Check Commit Message
      id: check_msg
      run: |
        COMMIT_MSG=$(git log -1 --pretty=%s)
        echo "Extracted Message: $COMMIT_MSG"
        
        # Check if the message starts with 'release' (case-insensitive)
        if [[ "${COMMIT_MSG,,}" =~ ^release ]]; then
          echo "match=true" >> $GITHUB_OUTPUT
          
          # Split the string by colon into an array
          IFS=':' read -r -a PARTS <<< "$COMMIT_MSG"
          
          # Extract and trim spaces from Title (Index 1)
          RAW_TITLE="${PARTS[1]}"
          TRIMMED_TITLE=$(echo "$RAW_TITLE" | xargs)
          
          # Extract and trim spaces from Message (Index 2)
          RAW_BODY="${PARTS[2]}"
          TRIMMED_BODY=$(echo "$RAW_BODY" | xargs)
          
          # Apply fallback defaults if fields are empty
          TITLE="${TRIMMED_TITLE:-Release #${{ github.run_number }}}"
          MESSAGE="${TRIMMED_BODY:-Automated production build asset.}"
          
          # Output variables to GitHub environment
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "body=$MESSAGE" >> $GITHUB_OUTPUT
        else
          echo "match=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up Java 17
      if: steps.check_msg.outputs.match == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      if: steps.check_msg.outputs.match == 'true'
      uses: android-actions/setup-android@v3

    - name: Make Gradle executable
      if: steps.check_msg.outputs.match == 'true'
      run: chmod +x gradlew

    - name: Build APK
      if: steps.check_msg.outputs.match == 'true'
      run: ./gradlew assemble

    - name: Create GitHub Release
      if: steps.check_msg.outputs.match == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v-${{ github.run_number }}"
        name: "${{ steps.check_msg.outputs.title }}"
        body: "${{ steps.check_msg.outputs.body }}"
        files: app/build/outputs/apk/**/*.apk

